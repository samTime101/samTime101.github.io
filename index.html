<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>samTime101</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body data-bs-theme="dark">
    <div id="left-div">
        <canvas id="left-canvas" style="border: 2px solid #00ffcc;"></canvas>
    </div>
    <div id="center-div">
        <canvas id="top-canvas" style="border:2px solid #00ffcc;"></canvas>
        <div id="terminal-container">
            <div id="terminal-output"></div>
            <div id="terminal-input-line">
                <span class="prompt"><span class="user">samipregmi@time101</span>:<span class="dir">~</span>$</span>
                <input type="text" name="command" id="command" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </div>
    </div>
    <div id="right-div">
        <canvas id="right-canvas" style="border: 2px solid #00ffcc;"></canvas>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/script.js"></script>
<script src="./js/left.js"></script>
<script src="./js/right.js"></script>
<script src="./js/top.js"></script>

</html>
